<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root{
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #2a2a2a;
            --accent: #c8f135;
            --accent2: #f13580;
            --text: #f0f0f0;
            --muted: #555;
        }        
        body{
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Mono',monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }
        body::before{
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(200,241,53,0.03)1px,transparent 1px),
                linear-gradient(90deg,rgba(200,241,53,0.03)1px,transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }
        .container{
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            animation: fadeUp 0.6s ease both;
        }
        @keyframes fadeUp{
            from{
                opacity: 0;
                transform: translateY(240px);
            }
            to{
                opacity: 1;
                transform: translateY(0);
            }            
        }
        header{
            margin-bottom: 2.5rem;
        }
        .tag{
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        h1{
            font-family: 'Syne',sans-serif;
            font-size: clamp(2rem,6vw,3rem);
            font-weight: 800;
            line-height: 1;
            color: var(--text);
        }
        h1 span{
            color: var(--accent);
        }
        .card{
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2rem;
            position: relative;
        }
        .card::before{
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 60px;
            height: 3px;
            background: var(--accent);
        }
        .input-group{
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        label{
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
        }
        input[type="text"]{
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Space Mono',monospace;
            font-size: 0.85rem;
            padding: 0.85rem 1rem;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }
        input[type="text"]:focus{
            border-color: var(--accent);
        }
        input[type="text"]::placeholder{
            color: var(--muted);
        }
        .options{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;            
        }
        .btn-generate{
            width: 100%;
            background: var(--accent);
            color: #0a0a0a;
            border: none;
            font-family: 'Space Mono',monospace;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-generate:hover{
            background: #d9ff4d;
        }
        .btn-generate:active{
            transform: scale(0.98);
        }
        .output-area{
            margin-top: 2rem;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            animation: fadeUp 0.4s ease both;
        }
        .output-area.visible{
            display: flex;
        }
        .qr-frame{
            background: #fff;
            padding: 16px;
            display: inline-block;
            box-shadow: 0 0 0 1px var(--border) 8px 8px 0 var(--accent);
        }
        #qrcode canvas,#qrcode img{
            display: block;
        }
        .btn-download{
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Space Mono',monospace;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.75rem 2rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-download:hover{
            background: var(--accent);
            color: #0a0a0a;
        }
        .error{
            color: var(--accent2);
            font-size: 0.75rem;
            margin-top: 0.4rem;
            display: none;
        }
        footer{
            margin-top: 2rem;
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <p class="tag">//utility tool</p>
            <h1>QR<span>.</span><br>Generator</h1>
        </header>

        <div class="card">
            <div class="input-group">
                <label for="url-input">URL or Text</label>
                <input type="text" id="url-input" placeholder="https://example.com" autocomplete="off">
                <span class="error" id="error-msg">Please enter a URL or text.</span>
            </div>

            <div class="options">
                <div class="input-group">
                    <label for="size-input">Size (px)</label>
                    <input type="text" id="size-input" value="256">
                </div>
                <div class="input-group">
                    <label for="color-input">QR color</label>
                    <input type="text" id="color-input" value="#000000" placeholder="#000000">
                </div>
            </div>

            <button class="btn-generate" onclick="generateQR()">Generate QR Code</button>

            <div class="output-area" id="output">
                <div class="qr-frame">
                    <div id="qrcode"></div>
                </div>
                <a class="btn-download" id="download-btn" download="qrcode.png">Download PNG</a>
            </div>
        </div>

        <footer>works entirely in your browser - no data sent anywhere</footer>
    </div>

    <script>
        function generateQR(){
            const url=document.getElementById('url-input').value.trim();
            const errorMsg=document.getElementById('error-msg');
            const output=document.getElementById('output');
            const qrDiv=document.getElementById('qrcode');
            const sizeVal=parseInt(document.getElementById('size-input').value) || 256;
            const colorVal=document.getElementById('color-input').value.trim() || '#000000';
            const size=Math.min(Math.max(sizeVal,64),512);

            if(!url){
                errorMsg.style.display='block';
                output.classList.remove('visible');
                return;
            }

            errorMsg.style.display='none';
            qrDiv.innerHTML='';

            new QRCode(qrDiv,{
                text: url,
                width: size,
                height: size,
                colorDark: colorVal,
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });

            output.classList.add('visible');

            setTimeout(()=>{
                const canvas=qrDiv.querySelector('canvas');
                if(canvas){
                    document.getElementById('download-btn').href=canvas.toDataURL('image/png');
                }
            },100);
        }

        document.getElementById('url-input').addEventListener('keydown',e=>{
            if(e.key=='Enter')  generateQR();
        });
    </script>
    
</body>
</html>
